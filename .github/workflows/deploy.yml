name: invoice-creation-api - (invoice.creation.tech/api)

on:
  push:
    branches: ["main"]

env:
  # ========= DOCKER CONFIG =========
  REGISTRY: docker.io
  IMAGE_NAME: subhaaan/invoice-creation-api
  IMAGE_TAG: beta

  # ========= CONTAINER CONFIG =========
  CONTAINER_NAME: invoice-creation-api
  CONTAINER_PORT: 5000
  HOST_PORT: 7015

  # ========= SERVER CONFIG =========
  SERVER_USER: ubuntu
  ENV_FILE_PATH: /home/ubuntu/env/backend.env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_UNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker stop ${{ env.CONTAINER_NAME }} || true
            docker rm ${{ env.CONTAINER_NAME }} || true
            docker run -d \
            --name ${{ env.CONTAINER_NAME }} \
            -p ${{ env.HOST_PORT }}:${{ env.CONTAINER_PORT }} \
            -v /bizcenter-uploads/sme-uploads:/app/uploads \
            --env-file ${{ env.ENV_FILE_PATH }} \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            docker image prune -af
